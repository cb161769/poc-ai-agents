version: "3.9"

services:
  neo4j:
    image: neo4j:5.12.0-community
    container_name: poc-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/test_password_local"
      NEO4J_server_memory_pagecache_size: "256m"
      NEO4J_server_memory_heap_initial__size: "256m"
      NEO4J_server_memory_heap_max__size: "512m"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p test_password_local 'RETURN 1' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - poc-net

  graph-seeder:
    image: neo4j:5.12.0-community
    container_name: poc-graph-seeder
    depends_on:
      neo4j:
        condition: service_healthy
    volumes:
      - ./seed:/seed:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "cypher-shell -a bolt://neo4j:7687 -u neo4j -p test_password_local -f /seed/seed.cypher &&
       echo '[graph-seeder] seed aplicado (fallback estatico; correr prompts/sync_graph_from_azure_devops.md para datos reales)'"
    networks:
      - poc-net

  sonarqube:
    image: sonarqube:10.6-community
    container_name: poc-sonarqube
    restart: unless-stopped
    ports:
      - "9000:9000"
    # Sin SONAR_JDBC_URL: SonarQube arranca con su base H2 embebida por
    # default. El valor que tenia antes ("jdbc:h2:tcp://localhost/sonar")
    # le pedia tratar a H2 como una base REMOTA por TCP, pero sin
    # sonar.embeddedDatabase.port ni un proceso H2 real escuchando ahi --
    # SonarQube crasheaba al arrancar (IllegalArgumentException: Missing
    # property sonar.embeddedDatabase.port). No hay Postgres en este
    # compose para Sonar, asi que la base embebida es la intencion real.
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q '\"status\":\"UP\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s
    networks:
      - poc-net

  sonar-scanner:
    image: sonarsource/sonar-scanner-cli:latest
    container_name: poc-sonar-scanner
    # La imagen corre como UID 1000 (scanner-cli) por default, sin permiso
    # de escritura sobre el volumen sonar_bootstrap_state (Docker lo crea
    # con ownership root) -- bootstrap_sonar.sh fallaba con "Permission
    # denied" al guardar el token. Container de bootstrap de un solo uso en
    # un entorno local de confianza, root es aceptable aca.
    user: "0:0"
    depends_on:
      sonarqube:
        condition: service_healthy
    volumes:
      - ./sample-repo:/usr/src:ro
      # /scripts SIN :ro -- bind-montar .env como archivo DENTRO de un
      # directorio que ya esta montado read-only fallaba al crear el
      # mountpoint ("read-only file system: mknod ... /scripts/.env").
      # El script no escribe nada en /scripts de todos modos.
      - ./scripts:/scripts
      - ./.env:/scripts/.env:ro
      - sonar_bootstrap_state:/state
    entrypoint: ["/bin/sh", "/scripts/bootstrap_sonar.sh"]
    environment:
      SONAR_HOST_URL: "http://sonarqube:9000"
    networks:
      - poc-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: poc-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    healthcheck:
      # qdrant/qdrant no trae wget ni curl -- usa /dev/tcp de bash (que si
      # esta) para armar un GET crudo a /readyz en vez de una herramienta de
      # red que no existe (mismo problema que tenia el healthcheck de ollama).
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/localhost/6333; printf \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3; head -1 <&3 | grep -q 200' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - poc-net

  rag-indexer:
    build:
      context: .
      dockerfile: Dockerfile.firewall
    container_name: poc-rag-indexer
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - ./sample-repo:/app/sample-repo:ro
      - ./scripts:/app/scripts:ro
      - ./cache:/app/cache
      - ./.env:/app/.env:ro
    entrypoint: ["python", "/app/scripts/index_rag_corpus.py"]
    env_file:
      - .env
    environment:
      QDRANT_URL: "http://qdrant:6333"
      # Faltaba: sin esto, sonar_client.py caia al SONAR_URL de .env
      # (localhost:9000), que DENTRO del contenedor apunta a si mismo, no a
      # sonarqube -- fetch_resolved_history() fallaba con Connection refused.
      SONAR_URL: "http://sonarqube:9000"
    networks:
      - poc-net

  ollama:
    image: ollama/ollama:latest
    container_name: poc-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU real si el host la tiene (docker info listando el runtime "nvidia"
    # confirma que esta disponible) -- sin esto, ollama/ollama:latest cae a
    # CPU en silencio ("GPU device discovery failed... entering low vram
    # mode" en el log), que es lo que causaba las llamadas de varios minutos
    # y los timeouts que vimos esta sesion. No requiere nada mas instalado:
    # el NVIDIA Container Toolkit ya esta activo en este host.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # La imagen ollama/ollama no trae wget ni curl -- el binario "ollama"
      # si esta y habla con el servidor local, asi que se usa el mismo en
      # vez de una herramienta de red que no existe (esto dejaba el
      # contenedor "unhealthy" para siempre aunque el servidor respondiera
      # bien, bloqueando a ollama-pull, que depende de service_healthy).
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - poc-net

  # Init container de un solo uso: descarga el modelo de tool-calling que
  # necesitan el agente juez / coding_agent.py contra el servidor "ollama" ya
  # levantado, para que "docker exec poc-ollama ollama pull llama3.1" ya no
  # sea un paso manual del README (§11). Se conecta via OLLAMA_HOST, no baja
  # nada localmente -- el modelo queda en el volumen ollama_models real.
  ollama-pull:
    image: ollama/ollama:latest
    container_name: poc-ollama-pull
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: "ollama:11434"
    entrypoint: ["ollama", "pull", "${OLLAMA_MODEL:-llama3.1}"]
    networks:
      - poc-net

  prefect-server:
    image: prefecthq/prefect:2-latest
    container_name: poc-prefect-server
    command: ["prefect", "server", "start", "--host", "0.0.0.0"]
    ports:
      - "4200:4200"
    volumes:
      - prefect_data:/root/.prefect
    healthcheck:
      # La imagen prefecthq/prefect no trae wget ni curl -- usa el python3
      # que si esta (mismo problema que tenian ollama/qdrant con imagenes
      # minimales sin herramientas de red de linea de comandos).
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 20s
    networks:
      - poc-net

  falco:
    image: falcosecurity/falco:latest
    container_name: poc-falco
    privileged: true
    pid: host
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - /proc:/host/proc:ro
      - /etc:/host/etc:ro
      - /boot:/boot:ro
      - /lib/modules:/host/lib/modules:ro
      - /usr:/host/usr:ro
      - ./falco/custom_rules.yaml:/etc/falco/rules.d/custom_rules.yaml:ro
      - ./logs:/var/log/falco
    command:
      - /usr/bin/falco
      # --modern-bpf ya no existe como flag de CLI en falcosecurity/falco:latest
      # (cambio de sintaxis entre versiones) -- el driver ahora se elige via
      # -o engine.kind=..., no un flag standalone.
      - -o
      - engine.kind=modern_ebpf
      - -o
      - json_output=true
      - -o
      - file_output.enabled=true
      - -o
      - file_output.filename=/var/log/falco/falco_alerts.jsonl
      - -o
      - file_output.keep_alive=true
    networks:
      - poc-net

  ai-firewall:
    build:
      context: .
      dockerfile: Dockerfile.firewall
    container_name: poc-ai-firewall
    restart: unless-stopped
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./logs:/app/logs
      - ./cache:/app/cache
      - ./.env:/app/.env:ro
    env_file:
      - .env
    environment:
      NEO4J_URI: "bolt://neo4j:7687"
      QDRANT_URL: "http://qdrant:6333"
      SONAR_URL: "http://sonarqube:9000"
    command: ["uvicorn", "firewall_proxy:app", "--host", "0.0.0.0", "--port", "8080"]
    networks:
      - poc-net

networks:
  poc-net:
    driver: bridge

volumes:
  neo4j_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
  sonar_bootstrap_state:
  ollama_models:
  prefect_data:
