<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <title>AuthService — Login</title>
</head>
<body>
  <form id="login-form">
    <input id="username" name="username" placeholder="usuario" autocomplete="username" />
    <input id="password" name="password" type="password" placeholder="contraseña" autocomplete="current-password" />
    <button type="submit">Ingresar</button>
  </form>
  <p id="result"></p>
  <script src="login.js"></script>
</body>
</html>
